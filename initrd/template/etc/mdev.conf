# pattern          user:group  mode
# USB mass storage (sdX nodes)
sd[a-z]            0:0         660
sd[a-z][0-9]*      0:0         660
# USB serial / CDC-ACM
ttyUSB*            0:0         666
ttyACM*            0:0         666
# common input
input/event*       0:0         640
# fallback
.*                 0:0         660
